name: CustomAlerts
main: CustomAlerts\CustomAlerts
version: 3.1.0
api:
  - 5.0.0

load: STARTUP

author:
  - EvolSoft
  - KanekiLeChomeur

description: Customize or hide alerts (join, quit, whitelist, outdated server/client, death messages, MOTD, and more)

website: https://github.com/EvolSoft/CustomAlerts

permissions:
  customalerts:
    description: CustomAlerts permission tree
    default: op

  customalerts.help:
    description: Allows access to /calerts help
    default: op

  customalerts.info:
    description: Allows access to /calerts info
    default: op

  customalerts.reload:
    description: Allows access to /calerts reload
    default: op
